name: Frontend CI/CD (Production)
on:
  push:
    branches:
      - production
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v3
      
      - name: 🟢 Use Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: 📝 Create .env file from GitHub Secrets
        run: |
          cat <<EOF > .env
          VITE_APP_BACKENDURL=${{ secrets.VITE_APP_BACKENDURL }}
          VITE_APP_FRONTENDURL=${{ secrets.VITE_APP_FRONTENDURL }}
          VITE_APP_WEBSITEURL=${{ secrets.VITE_APP_WEBSITEURL }}
          EOF
      
      - name: 🗂 Load environment variables from .env
        run: |
          set -a
          source .env
          set +a
      
      - name: 📦 Install dependencies
        run: npm install --force
      
      - name: 🔧 Build frontend
        run: npm run build
        env:
          CI: false
      
      - name: 💾 Create backup of current deployment
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BUCKET_NAME="${{ secrets.S3_BUCKET_NAME }}"
          BACKUP_PATH="${BUCKET_NAME}/support-center/production-backup-${TIMESTAMP}"
          
          # Check if support-center folder exists and has content to backup
          if aws s3 ls s3://${{ secrets.S3_BUCKET_NAME }}/support-center/ --region ${{ secrets.AWS_REGION }} | grep -q .; then
            echo "Creating backup of current support-center deployment..."
            aws s3 sync s3://${{ secrets.S3_BUCKET_NAME }}/support-center/ s3://${{ secrets.S3_BACKUP_BUCKET_NAME }}/${BACKUP_PATH}/ \
              --region ${{ secrets.AWS_REGION }}
            echo "Backup created at: s3://${{ secrets.S3_BACKUP_BUCKET_NAME }}/${BACKUP_PATH}/"
          else
            echo "No existing support-center deployment found to backup"
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
      
      - name: 🧹 Clean up old backups (keep last 3)
        run: |
          echo "Cleaning up old support-center backups..."
          BUCKET_NAME="${{ secrets.S3_BUCKET_NAME }}"
          
          # List all backup folders for support-center, sort by date (newest first), skip first 3, delete the rest
          aws s3 ls s3://${{ secrets.S3_BACKUP_BUCKET_NAME }}/${BUCKET_NAME}/support-center/ --region ${{ secrets.AWS_REGION }} | \
          grep "PRE production-backup-" | \
          awk '{print $2}' | \
          sed 's/\///g' | \
          sort -r | \
          tail -n +4 | \
          while read backup_folder; do
            if [ ! -z "$backup_folder" ]; then
              echo "Deleting old backup: ${BUCKET_NAME}/support-center/${backup_folder}"
              aws s3 rm s3://${{ secrets.S3_BACKUP_BUCKET_NAME }}/${BUCKET_NAME}/support-center/${backup_folder}/ --recursive --region ${{ secrets.AWS_REGION }}
            fi
          done
          
          echo "Backup cleanup completed for support-center"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
      
      - name: 📁 Deploy to S3 
        run: |
          aws s3 sync ./dist s3://${{ secrets.S3_BUCKET_NAME }}/support-center \
            --region ${{ secrets.AWS_REGION }} \
            --cache-control "no-cache, no-store, must-revalidate" \
            --delete
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
      
      - name: 🚀 Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/support-center/*"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
      
      - name: 📊 Display backup status
        run: |
          echo "=== Current Backups for ${{ secrets.S3_BUCKET_NAME }}/support-center ==="
          BUCKET_NAME="${{ secrets.S3_BUCKET_NAME }}"
          aws s3 ls s3://${{ secrets.S3_BACKUP_BUCKET_NAME }}/${BUCKET_NAME}/support-center/ --region ${{ secrets.AWS_REGION }} | grep "PRE production-backup-" | sort -r
          echo "=== Deployment completed successfully ==="
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
